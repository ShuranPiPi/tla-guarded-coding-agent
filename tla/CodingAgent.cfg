\* TLC configuration for the spec-guarded coding agent controller.
\* Run: java -cp tools/tla2tools.jar tlc2.TLC -config tla/CodingAgent.cfg tla/CodingAgent.tla

SPECIFICATION Spec

CONSTANTS
    MaxSpecRetries = 3
    MaxCodeRetries = 3

INVARIANTS
    TypeOK
    SpecCheckedBeforeCode
    NoDoneWithoutVerifiedSpec
    SpecFailOnlyAfterBudget
    CodeFailPreservesSpecSuccess
    BoundedRetries

PROPERTIES
    EventuallyTerminates

CHECK_DEADLOCK FALSE
